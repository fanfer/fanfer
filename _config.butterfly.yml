# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: fanfer 🥰
description: 'Future is now 🍭🍭🍭'
keywords: 'python,AI,fanfer'
author: fanfer🇨🇳
language: zh-CN
timezone: ''
favicon: /assets/milk2.svg
# electric_clock
# see https://anzhiy.cn/posts/fc18.html
